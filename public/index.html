<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zoo Viewer</title>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.typekit.net/zzv8rvm.css">
    <style>
      :root {
        color-scheme: dark;
        font-family: owners, ui-sans-serif, system-ui, sans-serif;
        background: #090d0b;
        color: #f5fff8;
      }

      html,
      body {
        font-family: owners, ui-sans-serif, system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(15, 107, 61, 0.35), transparent 35%),
          linear-gradient(180deg, #101712 0%, #090d0b 100%);
      }

      #app {
        min-height: 100vh;
      }

      .app-shell {
        min-height: 100vh;
        display: block;
      }

      .viewer-wrap {
        min-height: 100vh;
        padding: 1.25rem;
        display: flex;
        align-items: stretch;
        gap: 1.25rem;
      }

      .snapshot-column {
        flex: 0 0 clamp(10.5rem, 14vw, 13rem);
        width: clamp(10.5rem, 14vw, 13rem);
        min-height: calc(100vh - 2.5rem);
        display: flex;
      }

      .token-field {
        display: block;
      }

      .snapshot-rail {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
        gap: 0.75rem;
        pointer-events: auto;
      }

      .snapshot-rail[hidden] {
        display: none !important;
      }

      .snapshot-card {
        width: 100%;
        min-height: 0;
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        padding: 0.5rem;
        border: 1px solid rgba(113, 255, 180, 0.14);
        border-radius: 4px;
        background: rgba(8, 14, 10, 0.72);
        backdrop-filter: blur(18px);
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.08),
          inset 0 0 0 1px rgba(113, 255, 180, 0);
        cursor: pointer;
        transition:
          border-color 120ms ease,
          box-shadow 120ms ease,
          background 120ms ease;
      }

      .snapshot-card[data-active='true']:hover {
        border-color: rgba(113, 255, 180, 0.28);
        background: rgba(10, 17, 12, 0.84);
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.08),
          inset 0 0 0 1px rgba(113, 255, 180, 0.16);
      }

      .snapshot-card[data-active='false'] {
        cursor: default;
      }

      .snapshot-label {
        display: block;
        margin-bottom: 0.35rem;
        color: #dfffea;
        font-size: 0.72rem;
        font-weight: 650;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .snapshot-frame {
        position: relative;
        width: 100%;
        flex: 0 0 auto;
        min-height: 0;
        aspect-ratio: 1 / 1;
        border-radius: 4px;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(113, 255, 180, 0.06), rgba(8, 14, 10, 0.92)),
          #0f1712;
      }

      .snapshot-frame img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: center;
      }

      .snapshot-frame img[hidden] {
        display: none !important;
      }

      .snapshot-empty {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.6rem;
        color: rgba(223, 255, 234, 0.58);
        font-size: 0.72rem;
        text-align: center;
      }

      .snapshot-empty[hidden] {
        display: none !important;
      }

      .browser-banner {
        position: absolute;
        top: calc(100% + 6rem);
        left: 50%;
        transform: translateX(-50%);
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 0.7rem;
        padding: 0.65rem 0.8rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        color: #f5fff8;
        text-decoration: none;
        background: rgba(8, 14, 10, 0.82);
        backdrop-filter: blur(18px);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
        white-space: nowrap;
      }

      .browser-banner[hidden] {
        display: none !important;
      }

      .browser-banner-icons {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
      }

      .browser-banner-option {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }

      .browser-banner-link {
        color: inherit;
        padding: 0.1rem 0.25rem;
      }

      .browser-banner-icon {
        width: 1.05rem;
        height: 1.05rem;
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .browser-banner-link {
        text-decoration: none;
        border-radius: 999px;
      }

      .browser-banner-link:hover {
        background: rgba(255, 255, 255, 0.06);
      }

      .browser-banner-icon svg,
      .browser-banner-icon img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
      }

      .token-field input {
        width: clamp(12rem, 24vw, 18rem);
        padding: 0.7rem 0.85rem;
        border: 1px solid rgba(113, 255, 180, 0.22);
        border-radius: 4px;
        color: #f5fff8;
        background: rgba(8, 14, 10, 0.78);
        backdrop-filter: blur(18px);
        outline: none;
      }

      .token-field input:focus {
        border-color: rgba(113, 255, 180, 0.54);
        box-shadow: 0 0 0 3px rgba(113, 255, 180, 0.12);
      }

      .token-field input::placeholder {
        color: rgba(223, 255, 234, 0.42);
      }

      .kcl-error {
        width: min(32rem, 44vw);
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
        padding: 0.8rem 0.9rem;
        border: 1px solid rgba(255, 109, 109, 0.32);
        border-radius: 4px;
        color: #ffe3e3;
        background: rgba(58, 12, 12, 0.88);
        backdrop-filter: blur(18px);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.16);
      }

      .kcl-error[data-copyable='true'] {
        cursor: pointer;
      }

      .kcl-error[hidden] {
        display: none !important;
      }

      .kcl-error-label {
        color: #ffd4d4;
        font-size: 0.72rem;
        font-weight: 650;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .kcl-error pre {
        margin: 0;
        max-height: 12rem;
        overflow: auto;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.82rem;
        line-height: 1.45;
      }

      .meta {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        justify-content: flex-end;
      }

      .meta span {
        padding: 0.45rem 0.7rem;
        border-radius: 4px;
        background: rgba(8, 14, 10, 0.78);
        backdrop-filter: blur(18px);
        color: #dfffea;
        font-size: 0.92rem;
      }

      .viewer-connection {
        position: absolute;
        z-index: 3;
        top: 4.5rem;
        right: 2.1rem;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 0.75rem;
        max-width: min(24rem, 38vw);
      }

      .viewer-connection [data-source] {
        max-width: min(16rem, 24vw);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 0.45rem 0.7rem;
        border-radius: 4px;
        background: rgba(8, 14, 10, 0.78);
        backdrop-filter: blur(18px);
        color: #dfffea;
        font-size: 0.92rem;
      }

      .viewer-version {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 4.8rem;
        padding: 0.4rem 0.58rem;
        border: 1px solid rgba(113, 255, 180, 0.18);
        border-radius: 999px;
        background: rgba(8, 14, 10, 0.72);
        backdrop-filter: blur(18px);
        color: rgba(223, 255, 234, 0.82);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        line-height: 1;
        text-transform: uppercase;
      }

      .viewer-connection [data-source][hidden] {
        display: none !important;
      }

      .viewer-connection [data-status] {
        width: 2.3rem;
        height: 2.3rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border-radius: 4px;
        background: rgba(8, 14, 10, 0.78);
        backdrop-filter: blur(18px);
        color: #dfffea;
      }

      .viewer-connection [data-status][hidden] {
        display: none !important;
      }

      .viewer-connection [data-status] svg {
        width: 1.15rem;
        height: 1.15rem;
      }

      .meta [data-edges] {
        width: 2.3rem;
        height: 2.3rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(113, 255, 180, 0.22);
        border-radius: 4px;
        color: #dfffea;
        background: rgba(8, 14, 10, 0.78);
        backdrop-filter: blur(18px);
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      }

      .meta [data-edges][hidden] {
        display: none !important;
      }

      .meta [data-edges][data-active='false'] {
        color: rgba(223, 255, 234, 0.58);
        background: rgba(8, 14, 10, 0.52);
      }

      .meta [data-edges]:hover {
        background: rgba(113, 255, 180, 0.12);
      }

      .meta [data-edges] svg {
        width: 1rem;
        height: 1rem;
      }

      .meta [data-xray] {
        width: 2.3rem;
        height: 2.3rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(113, 255, 180, 0.22);
        border-radius: 4px;
        color: #dfffea;
        background: rgba(8, 14, 10, 0.78);
        backdrop-filter: blur(18px);
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      }

      .meta [data-xray][hidden] {
        display: none !important;
      }

      .meta [data-xray][data-active='true'] {
        background: rgba(113, 255, 180, 0.18);
        border-color: rgba(113, 255, 180, 0.38);
      }

      .meta [data-xray]:hover {
        background: rgba(113, 255, 180, 0.12);
      }

      .meta [data-xray] svg {
        width: 1rem;
        height: 1rem;
      }

      .meta [data-diff] {
        width: 2.3rem;
        height: 2.3rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(113, 255, 180, 0.22);
        border-radius: 4px;
        color: #dfffea;
        background: rgba(8, 14, 10, 0.78);
        backdrop-filter: blur(18px);
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      }

      .meta [data-diff][hidden] {
        display: none !important;
      }

      .meta [data-diff][data-active='true'] {
        background: rgba(113, 255, 180, 0.18);
        border-color: rgba(113, 255, 180, 0.38);
      }

      .meta [data-diff]:hover {
        background: rgba(113, 255, 180, 0.12);
      }

      .meta [data-diff] svg {
        width: 1rem;
        height: 1rem;
      }

      .meta .diff-group {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .meta .diff-controls {
        position: absolute;
        right: 0;
        bottom: calc(100% + 0.45rem);
        display: flex;
        align-items: stretch;
        gap: 0.5rem;
      }

      .meta .diff-loaders {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        align-items: stretch;
      }

      .meta [data-diff-directory],
      .meta [data-diff-original],
      .meta [data-diff-file],
      .meta [data-diff-clipboard] {
        width: 2rem;
        height: 2rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(113, 255, 180, 0.22);
        border-radius: 4px;
        color: #dfffea;
        background: rgba(8, 14, 10, 0.78);
        backdrop-filter: blur(18px);
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      }

      .meta [data-diff-original][hidden],
      .meta [data-diff-directory][hidden],
      .meta [data-diff-file][hidden],
      .meta [data-diff-clipboard][hidden] {
        display: none !important;
      }

      .meta [data-diff-original]:hover,
      .meta [data-diff-directory]:hover,
      .meta [data-diff-file]:hover,
      .meta [data-diff-clipboard]:hover {
        background: rgba(113, 255, 180, 0.12);
      }

      .meta [data-diff-original] svg,
      .meta [data-diff-directory] svg,
      .meta [data-diff-file] svg,
      .meta [data-diff-clipboard] svg {
        width: 1rem;
        height: 1rem;
      }

      .meta [data-explode] {
        width: 2.3rem;
        height: 2.3rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(113, 255, 180, 0.22);
        border-radius: 4px;
        color: #dfffea;
        background: rgba(8, 14, 10, 0.78);
        backdrop-filter: blur(18px);
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      }

      .meta [data-explode][hidden] {
        display: none !important;
      }

      .meta [data-explode][data-active='true'] {
        background: rgba(113, 255, 180, 0.18);
        border-color: rgba(113, 255, 180, 0.38);
      }

      .meta [data-explode]:hover {
        background: rgba(113, 255, 180, 0.12);
      }

      .meta [data-explode] svg {
        width: 1rem;
        height: 1rem;
      }

      .meta .explode-group {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .meta .explode-controls {
        position: absolute;
        right: 0;
        bottom: calc(100% + 0.45rem);
        display: flex;
        align-items: stretch;
        gap: 0.5rem;
      }

      .meta .explode-modes {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        align-items: stretch;
      }

      .meta [data-explode-horizontal],
      .meta [data-explode-vertical],
      .meta [data-explode-radial],
      .meta [data-explode-grid] {
        width: 2rem;
        height: 2rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(113, 255, 180, 0.22);
        border-radius: 4px;
        color: #dfffea;
        background: rgba(8, 14, 10, 0.78);
        backdrop-filter: blur(18px);
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        font: inherit;
        font-size: 0.72rem;
        font-weight: 650;
        letter-spacing: 0.04em;
      }

      .meta [data-explode-horizontal][hidden],
      .meta [data-explode-vertical][hidden],
      .meta [data-explode-radial][hidden],
      .meta [data-explode-grid][hidden] {
        display: none !important;
      }

      .meta [data-explode-horizontal][data-active='true'],
      .meta [data-explode-vertical][data-active='true'],
      .meta [data-explode-radial][data-active='true'],
      .meta [data-explode-grid][data-active='true'] {
        background: rgba(113, 255, 180, 0.18);
        border-color: rgba(113, 255, 180, 0.38);
      }

      .meta [data-explode-horizontal]:hover,
      .meta [data-explode-vertical]:hover,
      .meta [data-explode-radial]:hover,
      .meta [data-explode-grid]:hover {
        background: rgba(113, 255, 180, 0.12);
      }

      .meta [data-explode-spacing] {
        width: 2rem;
        height: calc((2rem * 4) + (0.35rem * 3));
        margin: 0;
        accent-color: rgba(113, 255, 180, 0.92);
        writing-mode: vertical-lr;
        direction: rtl;
        cursor: ns-resize;
        align-self: stretch;
      }

      .meta [data-explode-spacing][hidden] {
        display: none !important;
      }

      .viewer-connection [data-disconnect] {
        width: 2.3rem;
        height: 2.3rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(255, 109, 109, 0.45);
        border-radius: 4px;
        color: #ffd6d6;
        background: rgba(58, 12, 12, 0.92);
        backdrop-filter: blur(18px);
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.14);
      }

      .viewer-connection [data-disconnect][hidden] {
        display: none !important;
      }

      .viewer-connection [data-disconnect]:hover {
        background: rgba(88, 18, 18, 0.96);
        border-color: rgba(255, 133, 133, 0.6);
      }

      .viewer-connection [data-disconnect] svg {
        width: 1rem;
        height: 1rem;
      }

      .logo-actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-top: 2rem;
        justify-content: center;
      }

      .logo-actions .icon-button {
        width: 3.1rem;
        height: 3.1rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(113, 255, 180, 0.25);
        border-radius: 4px;
        padding: 0.4rem;
        color: #f5fff8;
        background: rgba(113, 255, 180, 0.08);
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      }

      .logo-actions .icon-button:hover {
        background: rgba(113, 255, 180, 0.14);
      }

      .logo-actions .icon-button[data-pulse='true'] {
        animation: file-pulse 1.8s ease-out infinite;
      }

      .logo-actions .icon-button svg {
        width: 1.2rem;
        height: 1.2rem;
      }

      @keyframes file-pulse {
        0% {
          box-shadow:
            0 1px 2px rgba(0, 0, 0, 0.08),
            0 0 0 0 rgba(113, 255, 180, 0.22);
        }

        70% {
          box-shadow:
            0 1px 2px rgba(0, 0, 0, 0.08),
            0 0 0 10px rgba(113, 255, 180, 0);
        }

        100% {
          box-shadow:
            0 1px 2px rgba(0, 0, 0, 0.08),
            0 0 0 0 rgba(113, 255, 180, 0);
        }
      }

      .viewer-stage {
        position: relative;
        flex: 1 1 auto;
        min-width: 0;
        min-height: calc(100vh - 2.5rem);
      }

      .viewer-ui {
        position: absolute;
        z-index: 3;
        top: 4.5rem;
      }

      .viewer-ui-left {
        left: 2.1rem;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.75rem;
      }

      .viewer-ui-right {
        right: 2.1rem;
        top: auto;
        bottom: 2.1rem;
      }

      .viewer {
        position: relative;
        height: 100%;
        min-height: calc(100vh - 2.5rem);
        border: 1px solid rgba(113, 255, 180, 0.14);
        border-radius: 4px;
        overflow: hidden;
        background:
          radial-gradient(circle at top right, rgba(113, 255, 180, 0.12), transparent 30%),
          #0f1712;
      }

      .viewer .start {
        z-index: 1;
      }

      .viewer .start:hover {
        cursor: pointer;
      }

      .viewer .start svg {
        display: block;
        width: 100%;
        height: auto;
      }

      @media (max-width: 720px) {
        .viewer-wrap {
          gap: 0.85rem;
        }

        .snapshot-column {
          flex-basis: min(8.5rem, 28vw);
          width: min(8.5rem, 28vw);
        }

        .token-field {
          width: 100%;
        }

        .token-field input {
          width: 100%;
        }

        .kcl-error {
          width: 100%;
        }

        .viewer-ui {
          position: static;
          margin: 0 0 0.85rem;
        }

        .viewer-stage {
          display: flex;
          flex-direction: column;
        }

        .viewer-ui-right {
          display: flex;
          justify-content: flex-end;
          margin-top: auto;
        }

        .viewer-connection {
          top: 4.2rem;
          right: 1rem;
          max-width: min(18rem, 44vw);
        }

        .viewer {
          flex: 1 1 auto;
          min-height: 60vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
